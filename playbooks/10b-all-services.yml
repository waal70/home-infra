---
# file: 10b-all-services.yml
- name: Gather facts for services targets
  hosts:
    - services
  tasks:
    - name: Ping these hosts
      ansible.builtin.ping:
- name: Deploy services to the network
  hosts:
    - services:&portainer_server
  become: true
  roles:
    - waal70.vaultwarden
    - waal70.authentik
    - waal70.paperless_ngx
    - waal70.immich
    - waal70.homepage
    - waal70.backup

- name: Deploy services to outpost servers
  hosts:
    - services:&portainer_agent
  become: true
  roles:
    - waal70.forgejo
    - waal70.dev_tools
    - waal70.kiwix
    - waal70.debmirror
    - waal70.backup
  vars:
    endpoint_idx: 1  # These services will be deployed to the second endpoint (first outpost)
    backup_directories:
      - /appdata
      - /data
    backup_minute: "45"
  post_tasks:
    - name: Inform user of state of variable
      ansible.builtin.debug:
        msg: "host is {{ ansible_facts['hostname'] }}"
