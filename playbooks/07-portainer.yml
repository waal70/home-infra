---
# file: 07-portainer.yml
- name: Gather facts for homeserver and outposts
  hosts:
    - portainer
  tasks:
    - name: Ping these hosts in order to have their facts gathered
      ansible.builtin.ping:

- name: Setup the main Portainer server
  hosts:
    - portainer_server
  become: true
  # strategy: free # noqa: run-once[play]
  roles:
    - role: waal70.portainer
