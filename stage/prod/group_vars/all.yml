---
# group variables for all servers
stage: "production"
ansible_vault: "ansible-vault/{{ stage }}"
# debian_common will check to see if this mirror is alive and will use it as its main mirror
apt_mirror: debian.andrecatherine.net
apt_mirror_directory: "/"

apt_mirror_fallback: "debian.snt.utwente.nl"
apt_mirror_fallback_directory: "/debian"

site_timezone: "Europe/Amsterdam"

enable_journaling: true # Set to true to enable journaling, false to disable
enable_powersave: true
log2ram_size: 80M
log2ram_state: install # install, update, remove

sshd_config_file: /etc/ssh/sshd_config

interactive_user: awaal
interactive_home: /home/awaal
private_repo: "{{ lookup('ansible.builtin.env', 'HOME') | default('~') }}/ansible/home"
install_key: "{{ private_repo }}/ssh-keys/{{ ansible_user }}/{{ ansible_user }}-key-install-only"
ansible_user: "{{ remote_user | default('ansible') }}"
use_signed_keys: true
service_data_root: "/appdata"
service_data: "{{ service_data_root }}/{{ service_name }}"
service_db_root: "/data"
service_db: "{{ service_db_root }}/{{ service_name }}"
service_media: "{{ service_media_root }}/{{ service_name }}"
service_media_root: "/media"
service_name: "{{ role_name | default('NOT_A_ROLE') | split('.') | last }}"
